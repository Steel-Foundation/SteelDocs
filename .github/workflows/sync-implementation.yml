name: Sync implementation status

on:
  repository_dispatch:
    types: [steel-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SteelDocs
        uses: actions/checkout@v5

      - name: Checkout Steel
        uses: actions/checkout@v5
        with:
          repository: Steel-Foundation/SteelMC
          path: steel

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate implementation status
        run: bun run scripts/sync-implementation.ts ./steel

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/implementation-status.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update implementation status"
          git push
